@if (isDefaultRoute) {
  <p-menubar [model]="menuItems" class="app-menubar"
    (click)="onMenubarItemClick()"
    (mouseleave)="onMenubarLeave()">
    <ng-template pTemplate="start">
      <span class="app-title">{{ title }}</span>
    </ng-template>
    <ng-template pTemplate="end">
      <div class="menubar-end">
        @if (currentLayoutName) {
          <span class="current-layout-badge" title="Active layout">
            <i class="pi pi-objects-column"></i>
            {{ currentLayoutName }}
          </span>
        } @else {
          <span class="current-layout-badge default-layout" title="Default layout">
            <i class="pi pi-objects-column"></i>
            Default
          </span>
        }
        <span class="system-status" [class]="overallStatusClass"
              (click)="statusPopover.toggle($event)">
          <span class="system-status-dot" [class]="overallStatusClass"></span>
          {{ overallStatusLabel }}
          <i class="pi pi-chevron-down" style="font-size: 0.65rem"></i>
        </span>
        <p-popover #statusPopover styleClass="status-popover">
          <div class="status-dropdown">
            <div class="status-dropdown-header">Service Status</div>
            <div class="status-dropdown-row">
              <span class="system-status-dot" [class]="connectionStatusClass"></span>
              <span class="status-dropdown-label">{{ transportType }}</span>
              <span class="status-dropdown-value" [class]="connectionStatusClass">{{ connectionStatusLabel }}</span>
            </div>
            <div class="status-dropdown-row">
              <span class="system-status-dot" [class]="openfinStatusClass"></span>
              <span class="status-dropdown-label">OpenFin</span>
              <span class="status-dropdown-value" [class]="openfinStatusClass">{{ openfinStatusLabel }}</span>
            </div>
          </div>
        </p-popover>
        <button
          pButton
          type="button"
          (click)="toggleTheme()"
          class="p-button-text theme-toggle"
          aria-label="Toggle theme"
        >{{ themeLabel }}</button>
      </div>
    </ng-template>
  </p-menubar>

  <main #layoutContainer id="layout-container" class="openfin-layout-container"></main>

  <!-- Save Layout dialog -->
  <p-dialog
    header="Save Layout"
    [(visible)]="showSaveDialog"
    [modal]="true"
    [closable]="true"
    [style]="{ width: '400px' }"
    [draggable]="false"
    (onHide)="onSaveDialogHide()"
  >
    <div class="save-layout-form">
      <label for="layoutName">Layout Name</label>
      <input
        pInputText
        id="layoutName"
        [(ngModel)]="saveLayoutName"
        placeholder="e.g. My Trading View"
        (keydown.enter)="confirmSaveLayout()"
        class="save-layout-input"
        autofocus
      />
    </div>
    <ng-template pTemplate="footer">
      <button pButton label="Cancel" class="p-button-text" (click)="showSaveDialog = false"></button>
      <button pButton label="Save" icon="pi pi-save" (click)="confirmSaveLayout()" [disabled]="!saveLayoutName.trim()"></button>
    </ng-template>
  </p-dialog>
}

<router-outlet></router-outlet>
