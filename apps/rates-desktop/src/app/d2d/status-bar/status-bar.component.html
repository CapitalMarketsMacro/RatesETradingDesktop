<div class="status-bar">
  <span class="app-name">{{ appName }}</span>
  <span class="app-version">v{{ appVersion }}</span>
  <span class="env-badge" [class]="envClass">{{ environment | uppercase }}</span>

  <span class="divider">|</span>

  <span class="status-indicator" [title]="statusTooltip" (click)="toggleDetail()">
    <span class="status-dot" [class]="overallStatusClass"></span>
    <span class="status-value" [class]="overallStatusClass">{{ overallStatusLabel }}</span>
  </span>

  @if (showDetail) {
    <span class="divider">|</span>
    <span class="status-dot small" [class]="transportStatusClass"></span>
    <span class="detail-label">{{ transportType }}:</span>
    <span class="detail-value" [class]="transportStatusClass">{{ transportStatusLabel }}</span>

    <span class="divider">|</span>
    <span class="status-dot small" [class]="openfinStatusClass"></span>
    <span class="detail-label">OpenFin:</span>
    <span class="detail-value" [class]="openfinStatusClass">{{ openfinStatusLabel }}</span>
  }

</div>
